name: "assert hello(*()) == ('Hello\n\0World',)"
limit: 1000
memory_size: 0x1000
memory_mapped_io:
  0x80: [43, 43, 46, 10]
  0x84: []
reports:
  - name: Step-by-step
    slice: all
    view: |
      D0: {D0:hex} A0: {A0:hex} A7(SP): {A7:hex}
      {pc}:	{instruction}	{pc:label}
  - name: Check results
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}