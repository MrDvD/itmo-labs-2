name: "test"
limit: 300
memory_size: 0x1000
memory_mapped_io:
  0x80: [43, 43, 46, 10]
  0x84: []
reports:
  - name: Check results
    slice: last
    view: |
      {pc}:	{instruction}	{pc:label}
      D0: {D0:hex} D1: {D1:hex} D2: {D2:hex} D5: {D5:hex} A0: {A0:hex} A1: {A1:hex} A2: {A2:hex} A5: {A5:hex} A6: {A6:hex} A7(SP): {A7:hex} SR: {SR:bin}
      stack: {memory:308:335}
      buffer: {memory:336:368}
      virt_mem: {memory:0:32}
      hash: {memory:512:712}
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}