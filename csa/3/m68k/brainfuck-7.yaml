name: "assert brainfuck_interpreter('+++++[>+++++[>++<-]<-]>>.\n') == ('2', '')"
limit: 5000
memory_size: 0x1000
memory_mapped_io:
  0x80: [43, 43, 43, 43, 43, 91, 62, 43, 43, 43, 43, 43, 91, 62, 43, 43, 60, 45, 93, 60, 45, 93, 62, 62, 46, 10]
  0x84: []
reports:
  - name: Step-by-step
    slice: all
    view: |

      {pc}:	{instruction}	{pc:label}
      D0: {D0:hex} D1: {D1:hex} A0: {A0:hex} A1: {A1:hex} A6: {A6:hex} A7(SP): {A7:hex} SR: {SR:bin}
      stack: {memory:308:335}
      buffer: {memory:336:368}
      virt_mem: {memory:0:32}

  - name: Check results
    slice: last
    filter:
      - state
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [50]
      symio[0x80]: "" >>> ""
      symio[0x84]: "" >>> "2"