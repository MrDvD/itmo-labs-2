name: "assert sum_and_sum_squares(2, 50000, 50000) == [3435973836]"
limit: 2000
memory_size: 0x1000
memory_mapped_io:
  0x80: [2, 50000, 50000]
  0x84: []
reports:
  - name: Debug
    slice: ['head', 100]
    view: |
      PC: {pc:hex} {instruction}
      T0: {T0:dec}
      T1: {T1:dec}
      T2: {T2:dec}
      T3: {T3:dec}
      T4: {T4:dec}
      T5: {T5:dec}
      T6: {T6:dec}
      ---
  - name: Check results
    slice: last
    filter:
      - state
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [-858993460]
  - name: Execution statistics
    slice: last
    view: |
      sim:instruction-count: {sim:instruction-count}
      layout:sections-size:  {layout:sections-size} (text {layout:text-sections-size} / data {layout:data-sections-size})
      mem:instr-ranges:      {mem:instr-ranges}
      mem:data-ranges:       {mem:data-ranges}
      mem:io-ranges:         {mem:io-ranges}
      {isa-specific}
      {memory:table}