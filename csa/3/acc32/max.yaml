name: hello
limit: 1000
memory_size: 0x1000
memory_mapped_io:
  0x80: [104, 101, 108, 108, 111, 32, 119, 111, 114, 108, 100, 10]
  0x84: []
reports:
  - name: Step-by-step
    slice: all
    view: |
      {pc}:	{instruction}	{Acc:hex}
      {memory:0:32}
  - name: Result
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}
      {memory:0:32}